    const tabContainer = document.getElementById('tab-container');
    const unitsContainer = document.getElementById('units-container');

    Object.keys(vocabData).forEach((unit, unitIdx) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (unitIdx === 0 ? ' active' : '');
        tab.textContent = unit;
        tab.dataset.unit = unit;
        tab.addEventListener('click', () => switchTab(unit));
        tabContainer.appendChild(tab);

        const unitDiv = document.createElement('div');
        unitDiv.className = 'unit-section' + (unitIdx === 0 ? ' active' : '');
        unitDiv.id = 'unit-' + unit.replace(' ', '_');
        const data = vocabData[unit];
        const questionsHTML = data.questions.map((q, qIdx) => {
            const optsHTML = q.opts.map((opt, oIdx) =>
                `<label><input type="radio" name="q_${unitIdx}_${qIdx}" value="${oIdx}"> ${opt}</label>`
            ).join('');
            return `<div class="question"><p>${q.q}</p><div class="options">${optsHTML}</div><div class="feedback" id="fb_${unitIdx}_${qIdx}"></div></div>`;
        }).join('');
        unitDiv.innerHTML = `
            <h2>${unit}: ${data.title}</h2>
            ${questionsHTML}
            <button class="btn" onclick="checkUnit('${unit}')">Check ${unit}</button>
            <div class="score-box" id="score-${unit.replace(' ', '_')}"></div>
        `;
        unitsContainer.appendChild(unitDiv);
    });

    function switchTab(unit) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.unit-section').forEach(s => s.classList.remove('active'));
        document.querySelector(`.tab[data-unit="${unit}"]`).classList.add('active');
        document.getElementById('unit-' + unit.replace(' ', '_')).classList.add('active');
    }

    function checkUnit(unit) {
        const unitIdx = Object.keys(vocabData).indexOf(unit);
        const data = vocabData[unit];
        let score = 0;
        data.questions.forEach((q, qIdx) => {
            const sel = document.querySelector(`input[name="q_${unitIdx}_${qIdx}"]:checked`);
            const fb = document.getElementById(`fb_${unitIdx}_${qIdx}`);
            if (sel && parseInt(sel.value) === q.c) {
                fb.innerHTML = '<span class="correct">✔ Correct</span>';
                score++;
            } else {
                fb.innerHTML = `<span class="incorrect">✘ Correct: ${q.opts[q.c]}</span>`;
            }
        });
        document.getElementById('score-' + unit.replace(' ', '_')).textContent =
            `Score: ${score} / ${data.questions.length}`;
    }

    function showReport() {
        const studentId = document.getElementById('student-id-input').value.trim();
        if (!studentId) { alert('Please enter your Student ID first.'); return; }
        let reportHTML = `<strong>Student ID:</strong> ${studentId}<br>`;
        Object.keys(vocabData).forEach(unit => {
            const scoreEl = document.getElementById('score-' + unit.replace(' ', '_'));
            const scoreText = scoreEl ? scoreEl.textContent.replace('Score: ', '') : 'Not attempted';
            reportHTML += `<strong>${unit}:</strong> ${scoreText}<br>`;
        });
        document.getElementById('report-content').innerHTML = reportHTML;
        document.getElementById('report-box').style.display = 'block';
        document.getElementById('report-box').scrollIntoView({ behavior: 'smooth' });
    }
